name: Xomper
options:
  bundleIdPrefix: com.xomware
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: A3HMLDS2AL
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift.git
    from: "2.41.1"

targets:
  Xomper:
    type: application
    platform: iOS
    sources:
      - path: Xomper
        excludes:
          - "Config/Config.swift.template"
    settings:
      base:
        INFOPLIST_FILE: Xomper/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.Xomware.Xomper
        CODE_SIGN_IDENTITY: "Apple Development"
        PROVISIONING_PROFILE_SPECIFIER: ""
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait"
        SUPPORTED_INTERFACE_ORIENTATIONS~ipad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: Supabase
        product: Supabase
    postCompileScripts: []

schemes:
  Xomper:
    build:
      targets:
        Xomper: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
