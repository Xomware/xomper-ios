name: Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: false
        default: 'Automated TestFlight build'

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: macos-26
    permissions:
      contents: write  # needed to push the bumped semver tag back to the repo
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Generate Config.swift
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          API_GATEWAY_URL: ${{ secrets.API_GATEWAY_URL }}
          WHITELISTED_LEAGUE_ID: ${{ secrets.WHITELISTED_LEAGUE_ID }}
          WHITELISTED_LEAGUE_NAME: ${{ secrets.WHITELISTED_LEAGUE_NAME }}
        run: |
          cat > Xomper/Config/Config.swift <<EOF
          import Foundation

          enum Config {
              static let supabaseURL = "${SUPABASE_URL}"
              static let supabaseAnonKey = "${SUPABASE_ANON_KEY}"
              static let oauthCallbackURL = "xomper://login-callback"
              static let apiGatewayURL = "${API_GATEWAY_URL}"
              static let whitelistedLeagueId = "${WHITELISTED_LEAGUE_ID}"
              static let whitelistedLeagueName = "${WHITELISTED_LEAGUE_NAME}"

              static var isConfigured: Bool {
                  !supabaseURL.contains("YOUR_") && !supabaseAnonKey.contains("YOUR_")
              }
          }
          EOF

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_P8" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Compute version and build number
        id: version
        run: |
          # Conventional-commits-aware semver bump.
          #
          # 1. Find the latest v-prefixed tag. If none, base is v2.0.0
          #    so the first run produces 2.0.1 / 2.1.0 / 3.0.0 depending
          #    on the commits below.
          # 2. Inspect every commit subject since that tag (or all
          #    history if no tag).
          # 3. Determine the bump:
          #      - any "BREAKING CHANGE:" in body or "feat!:" / "fix!:"
          #        in subject → MAJOR
          #      - any "feat:" / "feat(...):" → MINOR
          #      - otherwise (only fix:/chore:/refactor:/docs: etc.) → PATCH
          # 4. Increment the corresponding semver component, reset the
          #    lower components.
          # 5. Tag the new version on HEAD and push it back so the next
          #    run sees this as the new baseline.
          #
          # Build number stays as a UTC timestamp — must be monotonically
          # increasing per Apple's rules and stays decoupled from the
          # marketing version.

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          BASE_VERSION="${LATEST_TAG#v}"
          BASE_VERSION="${BASE_VERSION:-2.0.0}"

          if [ -n "$LATEST_TAG" ]; then
            COMMIT_RANGE="${LATEST_TAG}..HEAD"
            COMMIT_SUBJECTS=$(git log "$COMMIT_RANGE" --pretty=%s)
            COMMIT_BODIES=$(git log "$COMMIT_RANGE" --pretty=%B)
          else
            COMMIT_SUBJECTS=$(git log --pretty=%s)
            COMMIT_BODIES=$(git log --pretty=%B)
          fi

          BUMP="patch"
          if echo "$COMMIT_BODIES" | grep -qE "^BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMIT_SUBJECTS" | grep -qE "^(feat|fix|refactor|perf|chore)(\([^)]+\))?!:"; then
            BUMP="major"
          elif echo "$COMMIT_SUBJECTS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          fi

          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          PATCH=$(echo "$BASE_VERSION" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          MARKETING_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          BUILD_NUMBER=$(date +%Y%m%d%H%M)

          echo "marketing=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${LATEST_TAG:-none}" >> "$GITHUB_OUTPUT"
          echo "Bump type:        $BUMP"
          echo "Previous version: $BASE_VERSION (tag: ${LATEST_TAG:-none})"
          echo "Marketing version: $MARKETING_VERSION"
          echo "Build number:      $BUILD_NUMBER"

      - name: Tag and push new version
        env:
          NEW_VERSION: ${{ steps.version.outputs.marketing }}
        run: |
          # Avoid duplicate-tag errors if a manual run with the same
          # commit fires twice (rare, but cheap to defend against).
          TAG="v${NEW_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG (auto-bumped: ${{ steps.version.outputs.bump }})"
          git push origin "$TAG"

      - name: Install Python deps for ASC API
        run: pip3 install --quiet --break-system-packages PyJWT cryptography requests

      - name: Free Apple Development cert slot (revoke oldest if at limit)
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          python3 <<'PY'
          import os, sys, time, jwt, requests
          key_id = os.environ["ASC_API_KEY_ID"]
          issuer = os.environ["ASC_API_ISSUER_ID"]
          with open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8")) as f:
              pk = f.read()
          def tok():
              return jwt.encode(
                  {"iss": issuer, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
                  pk, algorithm="ES256", headers={"kid": key_id, "typ": "JWT"})
          h = {"Authorization": f"Bearer {tok()}"}
          base = "https://api.appstoreconnect.apple.com/v1"
          r = requests.get(f"{base}/certificates", headers=h, params={"limit": 200})
          r.raise_for_status()
          all_certs = r.json()["data"]
          dev = [c for c in all_certs if c["attributes"].get("certificateType") in ("IOS_DEVELOPMENT", "DEVELOPMENT")]
          dev.sort(key=lambda c: c["attributes"].get("expirationDate", ""))
          print(f"Found {len(dev)} development cert(s):")
          for c in dev:
              print(f"  {c['id']} type={c['attributes'].get('certificateType')} name={c['attributes'].get('name')} expires={c['attributes'].get('expirationDate')}")
          keep_n = 1
          if len(dev) > keep_n:
              for c in dev[:len(dev) - keep_n]:
                  print(f"Revoking {c['id']} ({c['attributes'].get('name')})")
                  rr = requests.delete(f"{base}/certificates/{c['id']}", headers=h)
                  if rr.status_code >= 400:
                      print(f"!! Failed to revoke {c['id']}: {rr.status_code} {rr.text}", file=sys.stderr)
                  else:
                      print(f"Revoked {c['id']}")
          else:
              print("Under limit, no revocation needed")
          PY

      - name: Archive
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Xomper.xcodeproj \
            -scheme Xomper \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/Xomper.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            MARKETING_VERSION=${{ steps.version.outputs.marketing }} \
            CURRENT_PROJECT_VERSION=${{ steps.version.outputs.build }}

      - name: Create ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>destination</key>
              <string>export</string>
              <key>method</key>
              <string>app-store-connect</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>teamID</key>
              <string>${TEAM_ID}</string>
              <key>uploadSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Xomper.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            -authenticationKeyPath "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          IPA_PATH=$(find "$RUNNER_TEMP/export" -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"

      - name: Assign build to TestFlight groups
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          BUNDLE_ID: com.Xomware.Xomper
          BUILD_NUMBER: ${{ steps.version.outputs.build }}
          BETA_GROUPS: 'Beta'
        run: |
          python3 <<'PY'
          import os, sys, time
          import jwt, requests

          key_id = os.environ["ASC_API_KEY_ID"]
          issuer = os.environ["ASC_API_ISSUER_ID"]
          bundle_id = os.environ["BUNDLE_ID"]
          build_num = os.environ["BUILD_NUMBER"]
          groups = [g.strip() for g in os.environ["BETA_GROUPS"].split(",") if g.strip()]

          with open(os.path.expanduser(f"~/.appstoreconnect/private_keys/AuthKey_{key_id}.p8")) as f:
              private_key = f.read()

          def make_token():
              return jwt.encode(
                  {"iss": issuer, "iat": int(time.time()), "exp": int(time.time()) + 1200, "aud": "appstoreconnect-v1"},
                  private_key,
                  algorithm="ES256",
                  headers={"kid": key_id, "typ": "JWT"},
              )

          base = "https://api.appstoreconnect.apple.com/v1"
          headers = {"Authorization": f"Bearer {make_token()}"}

          r = requests.get(f"{base}/apps", headers=headers, params={"filter[bundleId]": bundle_id})
          r.raise_for_status()
          apps = r.json()["data"]
          if not apps:
              print(f"No app found for bundle {bundle_id}", file=sys.stderr)
              sys.exit(1)
          app_id = apps[0]["id"]
          print(f"App ID: {app_id}")

          build_id = None
          for attempt in range(30):
              r = requests.get(
                  f"{base}/builds",
                  headers=headers,
                  params={
                      "filter[app]": app_id,
                      "filter[version]": build_num,
                      "sort": "-uploadedDate",
                      "limit": 1,
                  },
              )
              r.raise_for_status()
              data = r.json()["data"]
              if data:
                  build_id = data[0]["id"]
                  state = data[0]["attributes"].get("processingState", "?")
                  print(f"Build {build_num} found: id={build_id} state={state}")
                  break
              print(f"Build {build_num} not yet visible, retry {attempt + 1}/30")
              time.sleep(20)

          if not build_id:
              print("Build never appeared in ASC API", file=sys.stderr)
              sys.exit(1)

          for name in groups:
              r = requests.get(
                  f"{base}/betaGroups",
                  headers=headers,
                  params={"filter[app]": app_id, "filter[name]": name},
              )
              r.raise_for_status()
              data = r.json()["data"]
              if not data:
                  print(f"!! Beta group {name!r} not found — skipping. Create it in App Store Connect.")
                  continue
              group = data[0]
              group_id = group["id"]
              if group["attributes"].get("isInternalGroup"):
                  print(f"Group {name!r} is internal — auto-receives all builds, skipping manual assignment")
                  continue
              r = requests.post(
                  f"{base}/betaGroups/{group_id}/relationships/builds",
                  headers={**headers, "Content-Type": "application/json"},
                  json={"data": [{"type": "builds", "id": build_id}]},
              )
              if r.status_code >= 400:
                  print(f"!! Failed to assign to {name}: {r.status_code} {r.text}", file=sys.stderr)
                  sys.exit(1)
              print(f"Assigned build to group {name!r} ({group_id})")
          PY

      - name: Cleanup API key
        if: always()
        run: rm -f ~/.appstoreconnect/private_keys/*.p8
